# docker-compose.yml
# ──────────────────
# Option A: Run Endee via Docker, API + Streamlit run locally.
#
#   docker compose up -d
#   uvicorn api.server:app --host 0.0.0.0 --port 8000 --reload
#   streamlit run app/main.py

version: "3.9"

services:
  endee:
    image: endeeio/endee:latest
    container_name: devsearch-endee
    ports:
      - "8080:8080"
    environment:
      # Open mode (no token) — set NDD_AUTH_TOKEN for auth mode
      NDD_AUTH_TOKEN: ""
      NDD_LOG_LEVEL: "info"
    volumes:
      - endee_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/indexes" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  endee_data:
    driver: local
