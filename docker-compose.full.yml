# docker-compose.full.yml
# ────────────────────────
# Option B: Full-stack — Endee + FastAPI backend + Streamlit frontend, all in Docker.
#
#   docker compose -f docker-compose.full.yml up -d --build
#
# Access:
#   Streamlit UI : http://localhost:8501
#   FastAPI Docs : http://localhost:8000/docs
#   Endee        : http://localhost:8080

version: "3.9"

services:

  # ── Vector database ─────────────────────────────────────────────────────────
  endee:
    image: endeeio/endee:latest
    container_name: devsearch-endee
    ports:
      - "8080:8080"
    environment:
      NDD_AUTH_TOKEN: ""
      NDD_LOG_LEVEL: "info"
    volumes:
      - endee_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/indexes" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsearch-api
    command: [ "uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000" ]
    ports:
      - "8000:8000"
    environment:
      ENDEE_BASE_URL: "http://endee:8080/api/v1"
      ENDEE_AUTH_TOKEN: ""
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-google/gemini-flash-1.5}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit frontend ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsearch-app
    command: [ "streamlit", "run", "app/main.py", "--server.port=8501", "--server.headless=true", "--server.address=0.0.0.0" ]
    ports:
      - "8501:8501"
    environment:
      DEVSEARCH_API_URL: "http://api:8000"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  endee_data:
    driver: local
