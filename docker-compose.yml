# docker-compose.yml
# ──────────────────
# Option A: Run Endee via Docker, DevSearch app runs locally.
#
#   docker compose up -d
#   streamlit run app/main.py
#
# Endee will be available at http://localhost:8080
# Set ENDEE_BASE_URL=http://localhost:8080/api/v1 in your .env

version: "3.9"

services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    environment:
      NDD_NUM_THREADS: 0 # 0 = auto-detect
      NDD_AUTH_TOKEN: "" # Set a token for auth, leave empty for open mode
    volumes:
      - endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  endee-data:
    driver: local
